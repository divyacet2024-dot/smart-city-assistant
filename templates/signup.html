<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Bin</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Back to Home -->
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            <!-- Logo -->
            <div class="auth-logo">
                <i class="fas fa-recycle"></i>
                <h1>Smart Bin</h1>
            </div>
            
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join the smart waste management revolution</p>

            <!-- Google Signup Button -->
            <button class="btn-google" onclick="signupWithGoogle()">
                <i class="fab fa-google"></i>
                Sign up with Google
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Email Signup Form -->
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="name">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <!-- Login Link -->
            <p class="auth-link">
                Already have an account? <a href="/login">Login</a>
            </p>

            <!-- Error/Success Message -->
            <div id="authMessage" class="auth-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        function signupWithGoogle() {
            const email = prompt('Enter your Google email:');
            if (email) {
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, type: 'google' })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showMessage('Account created with Google!', 'success');
                        setTimeout(() => window.location.href = data.redirect || '/dashboard', 1000);
                    } else {
                        showMessage(data.message, 'error');
                    }
                })
                .catch(err => showMessage('Error connecting to server', 'error'));
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            })
            .catch(err => showMessage('Error connecting to server', 'error'));
        }

        function showMessage(message, type) {
            const msgDiv = document.getElementById('authMessage');
            msgDiv.textContent = message;
            msgDiv.className = 'auth-message ' + type;
            msgDiv.style.display = 'block';
        }
    </script>
</body>
</html>
