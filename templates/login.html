<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Bin</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Back to Home -->
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            <!-- Logo -->
            <div class="auth-logo">
                <i class="fas fa-recycle"></i>
                <h1>Smart Bin</h1>
            </div>
            
            <h2>Welcome Back!</h2>
            <p class="auth-subtitle">Login to your account</p>

            <!-- Google Login Button -->
            <button class="btn-google" onclick="loginWithGoogle()">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Email Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- Signup Link -->
            <p class="auth-link">
                Don't have an account? <a href="/signup">Sign up</a>
            </p>

            <!-- Error/Success Message -->
            <div id="authMessage" class="auth-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        function loginWithGoogle() {
            const email = prompt('Enter your Google email:');
            if (email) {
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, type: 'google' })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showMessage(data.message, 'success');
                        setTimeout(() => window.location.href = data.redirect || '/dashboard', 1000);
                    } else {
                        showMessage(data.message, 'error');
                    }
                })
                .catch(err => showMessage('Error connecting to server', 'error'));
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password, type: 'email' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => window.location.href = data.redirect || '/dashboard', 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            })
            .catch(err => showMessage('Error connecting to server', 'error'));
        }

        function showMessage(message, type) {
            const msgDiv = document.getElementById('authMessage');
            msgDiv.textContent = message;
            msgDiv.className = 'auth-message ' + type;
            msgDiv.style.display = 'block';
        }
    </script>
</body>
</html>
